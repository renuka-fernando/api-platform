name: Periodic Gateway Build

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  hourly-build:
    name: Periodic Gateway Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read

    steps:
      # ------------------------------------------------------------
      # Checkout MUST be first
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Initialize all log files (guarantee existence)
      # ------------------------------------------------------------
      - name: Initialize log files
        run: |
          touch \
            1-initiate.log \
            2-gw-build.log \
            3-cli-build.log \
            4-prepare-dir.log \
            5-ap-gw-image-build.log \
            6-sample-policies-gw-image-build.log \
            docker.log

      # ------------------------------------------------------------
      # 1. Docker / Buildx (aligned with gateway-release.yml)
      # ------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver: docker-container

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Initiate environment
        run: |
          set -o pipefail
          {
            echo "== Repository =="
            git rev-parse HEAD

            echo "== Docker =="
            docker version

            echo "== Buildx =="
            docker buildx ls
            docker buildx inspect --bootstrap
          } 2>&1 | tee 1-initiate.log || true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache-dependency-path: '**/go.sum'

      # ------------------------------------------------------------
      # 2. Build gateway
      # ------------------------------------------------------------
      - name: Build gateway
        working-directory: ./gateway
        run: |
          set -o pipefail
          (make build) 2>&1 | tee "$GITHUB_WORKSPACE/2-gw-build.log"

      # ------------------------------------------------------------
      # 3. Build CLI
      # ------------------------------------------------------------
      - name: Build CLI
        working-directory: ./cli/src
        run: |
          set -o pipefail
          (make build-all) 2>&1 | tee "$GITHUB_WORKSPACE/3-cli-build.log"

      # ------------------------------------------------------------
      # 4. Prepare run directory
      # ------------------------------------------------------------
      - name: Prepare my-gw run directory
        run: |
          set -o pipefail
          {
            rm -rf my-gw
            mkdir my-gw

            if [ -f cli/src/build/ap-linux-amd64 ]; then
              cp cli/src/build/ap-linux-amd64 my-gw/ap
            else
              cp cli/src/build/ap-linux-amd64-v* my-gw/ap
            fi

            chmod +x my-gw/ap

            if [ -f gateway/build.yaml ]; then
              cp gateway/build.yaml my-gw/build.yaml
            fi

            # Copy sample-policies dir (build.yaml uses relative filePath entries)
            if [ -d gateway/sample-policies ]; then
              cp -r gateway/sample-policies my-gw/sample-policies
            fi
          } 2>&1 | tee 4-prepare-dir.log

      # ------------------------------------------------------------
      # 5. Gateway image build + docker.log extraction
      # ------------------------------------------------------------
      - name: Build gateway image
        working-directory: ./my-gw
        env:
          CI: ""
          WSO2AP_GW_USERNAME: ${{ secrets.WSO2AP_GW_USERNAME || '' }}
          WSO2AP_GW_PASSWORD: ${{ secrets.WSO2AP_GW_PASSWORD || '' }}
        run: |
          set -o pipefail

          LOG_ROOT="$HOME/.wso2ap/.tmp"

            set -o pipefail

            # (removed background tailing - will copy logs after build instead)

            # Run the build and capture stdout/stderr into the workspace build log.
            (./ap gateway image build) 2>&1 | tee "$GITHUB_WORKSPACE/5-ap-gw-image-build.log"
            BUILD_RC=${PIPESTATUS[0]}

            # Resolve the most recent gateway build log directory (CLI uses gateway-image-build-<id>/logs/docker.log)
            LOG_DIR="$(ls -dt "$LOG_ROOT"/gateway-image-build*/logs 2>/dev/null | head -n1 || true)"
            REAL_DOCKER_LOG="${LOG_DIR:+$LOG_DIR/docker.log}"

            # Post-build diagnostics: list/log sizes/stat to help debug missing files
            echo "=== DIAGNOSTICS: list $LOG_DIR ===" >> "$GITHUB_WORKSPACE/5-ap-gw-image-build.log" 2>&1
            ls -la "$LOG_DIR" >> "$GITHUB_WORKSPACE/5-ap-gw-image-build.log" 2>&1 || true
            echo "=== DIAGNOSTICS: stat $REAL_DOCKER_LOG ===" >> "$GITHUB_WORKSPACE/5-ap-gw-image-build.log" 2>&1
            stat "$REAL_DOCKER_LOG" >> "$GITHUB_WORKSPACE/5-ap-gw-image-build.log" 2>&1 || true
            echo "=== DIAGNOSTICS: du -h $LOG_DIR ===" >> "$GITHUB_WORKSPACE/5-ap-gw-image-build.log" 2>&1
            du -h "$LOG_DIR" >> "$GITHUB_WORKSPACE/5-ap-gw-image-build.log" 2>&1 || true

            # Copy any .log files from the real log dir into the workspace (try normal copy, then sudo if necessary)
            if [ -d "$LOG_DIR" ]; then
              mkdir -p "$GITHUB_WORKSPACE/.wso2ap/.tmp/gateway-image-build/logs"
              for f in "$LOG_DIR"/*.log; do
                [ -e "$f" ] || continue
                cp "$f" "$GITHUB_WORKSPACE/.wso2ap/.tmp/gateway-image-build/logs/" 2>>"$GITHUB_WORKSPACE/5-ap-gw-image-build.log" || (
                  sudo cp "$f" "$GITHUB_WORKSPACE/.wso2ap/.tmp/gateway-image-build/logs/" 2>>"$GITHUB_WORKSPACE/5-ap-gw-image-build.log" || echo "copy failed for $f" >>"$GITHUB_WORKSPACE/5-ap-gw-image-build.log"
                )
              done
              # Also copy the primary docker.log into workspace root for convenience
              if [ -f "$REAL_DOCKER_LOG" ]; then
                cp "$REAL_DOCKER_LOG" "$GITHUB_WORKSPACE/docker.log" 2>>"$GITHUB_WORKSPACE/5-ap-gw-image-build.log" || sudo cp "$REAL_DOCKER_LOG" "$GITHUB_WORKSPACE/docker.log" 2>>"$GITHUB_WORKSPACE/5-ap-gw-image-build.log" || true
              fi
            fi

            # (no background tail to kill)

            # Exit with the build return code so failures are visible
            if [ "${BUILD_RC}" -ne 0 ]; then
              if [ -f "$REAL_DOCKER_LOG" ]; then
                echo "=== docker.log (last 200 lines) ===" >> "$GITHUB_WORKSPACE/5-ap-gw-image-build.log"
                tail -n 200 "$REAL_DOCKER_LOG" >> "$GITHUB_WORKSPACE/5-ap-gw-image-build.log" 2>&1 || true
              fi
              echo "ap gateway image build failed (rc=${BUILD_RC})" >&2
              exit ${BUILD_RC}
            fi

      # ------------------------------------------------------------
      # 6. Gateway image build using sample-policies/build.yaml
      # ------------------------------------------------------------
      - name: Build gateway image with sample policies
        working-directory: ./my-gw
        env:
          CI: ""
          WSO2AP_GW_USERNAME: ${{ secrets.WSO2AP_GW_USERNAME || '' }}
          WSO2AP_GW_PASSWORD: ${{ secrets.WSO2AP_GW_PASSWORD || '' }}
        run: |
          set -o pipefail

          LOG_ROOT="$HOME/.wso2ap/.tmp"

            set -o pipefail

            # cd into sample-policies so that relative filePath entries in build.yaml resolve correctly
            (cd sample-policies && ../ap gateway image build) 2>&1 | tee "$GITHUB_WORKSPACE/6-sample-policies-gw-image-build.log"
            BUILD_RC=${PIPESTATUS[0]}

            LOG_DIR="$(ls -dt "$LOG_ROOT"/gateway-image-build*/logs 2>/dev/null | head -n1 || true)"
            REAL_DOCKER_LOG="${LOG_DIR:+$LOG_DIR/docker.log}"

            # Post-build diagnostics
            echo "=== DIAGNOSTICS: list $LOG_DIR ===" >> "$GITHUB_WORKSPACE/6-sample-policies-gw-image-build.log" 2>&1
            ls -la "$LOG_DIR" >> "$GITHUB_WORKSPACE/6-sample-policies-gw-image-build.log" 2>&1 || true
            echo "=== DIAGNOSTICS: stat $REAL_DOCKER_LOG ===" >> "$GITHUB_WORKSPACE/6-sample-policies-gw-image-build.log" 2>&1
            stat "$REAL_DOCKER_LOG" >> "$GITHUB_WORKSPACE/6-sample-policies-gw-image-build.log" 2>&1 || true
            echo "=== DIAGNOSTICS: du -h $LOG_DIR ===" >> "$GITHUB_WORKSPACE/6-sample-policies-gw-image-build.log" 2>&1
            du -h "$LOG_DIR" >> "$GITHUB_WORKSPACE/6-sample-policies-gw-image-build.log" 2>&1 || true

            # Copy any .log files from the real log dir into the workspace
            if [ -d "$LOG_DIR" ]; then
              mkdir -p "$GITHUB_WORKSPACE/.wso2ap/.tmp/gateway-image-build/logs"
              for f in "$LOG_DIR"/*.log; do
                [ -e "$f" ] || continue
                cp "$f" "$GITHUB_WORKSPACE/.wso2ap/.tmp/gateway-image-build/logs/" 2>>"$GITHUB_WORKSPACE/6-sample-policies-gw-image-build.log" || (
                  sudo cp "$f" "$GITHUB_WORKSPACE/.wso2ap/.tmp/gateway-image-build/logs/" 2>>"$GITHUB_WORKSPACE/6-sample-policies-gw-image-build.log" || echo "copy failed for $f" >>"$GITHUB_WORKSPACE/6-sample-policies-gw-image-build.log"
                )
              done
              if [ -f "$REAL_DOCKER_LOG" ]; then
                cp "$REAL_DOCKER_LOG" "$GITHUB_WORKSPACE/docker.log" 2>>"$GITHUB_WORKSPACE/6-sample-policies-gw-image-build.log" || sudo cp "$REAL_DOCKER_LOG" "$GITHUB_WORKSPACE/docker.log" 2>>"$GITHUB_WORKSPACE/6-sample-policies-gw-image-build.log" || true
              fi
            fi

            # Exit with the build return code so failures are visible
            if [ "${BUILD_RC}" -ne 0 ]; then
              if [ -f "$REAL_DOCKER_LOG" ]; then
                echo "=== docker.log (last 200 lines) ===" >> "$GITHUB_WORKSPACE/6-sample-policies-gw-image-build.log"
                tail -n 200 "$REAL_DOCKER_LOG" >> "$GITHUB_WORKSPACE/6-sample-policies-gw-image-build.log" 2>&1 || true
              fi
              echo "ap gateway image build with sample policies failed (rc=${BUILD_RC})" >&2
              exit ${BUILD_RC}
            fi

      # ------------------------------------------------------------
      # Upload logs ALWAYS
      # ------------------------------------------------------------
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-build-logs
          path: |
            1-initiate.log
            2-gw-build.log
            3-cli-build.log
            4-prepare-dir.log
            5-ap-gw-image-build.log
            6-sample-policies-gw-image-build.log
            docker.log
